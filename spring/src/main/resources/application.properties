spring.application.name=waitlist

# Active Profile (dev or prod)
spring.profiles.active=dev

# Common JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver

# Common Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baselineOnMigrate=true
spring.flyway.validateOnMigrate=true
spring.flyway.outOfOrder=false

# Common Server Configuration
server.servlet.context-path=/

# Static Resources
spring.web.resources.static-locations=classpath:/static/

# Content Negotiation - Default to JSON
spring.mvc.contentnegotiation.default-content-type=application/json
spring.mvc.contentnegotiation.favor-parameter=false
spring.mvc.contentnegotiation.favor-path-extension=false

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
spring.mvc.throw-exception-if-no-handler-found=true

# URL of the frontend application (used when constructing links in SMS/emails)
# override per-profile in application-<profile>.properties or via env var
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# Twilio configuration stored per-account now; credentials moved into database
# optional default sending number
twilio.from-number=${TWILIO_FROM_NUMBER:+18777532491}
# when running with 'dev' profile, override recipient to this fixed number
# set use-dev-number=true to enable the override
# example: twilio.use-dev-number=true
# the target number itself is configured with twilio.dev-target
twilio.use-dev-number=${TWILIO_USE_DEV_NUMBER:false}
twilio.dev-target=${TWILIO_DEV_TARGET:+18777804236} 

# SID used by the service when sending a test/validation message.  The
# default matches the magic value that used to be hard‑coded in SmsService.
# Can be overridden via environment variable TWILIO_TEST_MESSAGE_SID.
twilio.test-message-sid=${TWILIO_TEST_MESSAGE_SID:MG809047ae156a31adfad093128ac80b03}
