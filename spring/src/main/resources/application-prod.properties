# Production Profile

# Database Configuration
# These should be set via environment variables in production
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://host.docker.internal:5432/waitlist}
spring.datasource.username=${DATABASE_USERNAME:dragon}
spring.datasource.password=${DATABASE_PASSWORD:ieatsheep}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Server Configuration
server.port=${PORT:8080}

# Static Resources
spring.web.resources.cache.period=3600

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost}

# JWT Configuration (24 hours for production)
app.jwt.expiration.days=1
app.jwt.expiration.hours=0
app.jwt.expiration.minutes=0

# Twilio credentials for development (leave blank or set via env vars)
# Twilio credentials are now stored per-account in the database
twilio.from-number=+18777532491
# when running dev profile also enforce the fixed SMS target
twilio.dev-target=+18777804236
twilio.use-dev-number=true