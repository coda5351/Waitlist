# Development Profile

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/waitlistdb
spring.datasource.username=dragon
spring.datasource.password=ieatsheep

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Server Configuration
server.port=8080

# Static Resources
spring.web.resources.cache.period=0

# CORS
cors.allowed-origins=http://localhost:5173,http://localhost:8080

# frontend base URL (helps build links sent to users)
app.frontend.url=http://localhost:5173

# Mail configuration (smtp4dev listens on port 25 inside the container,
# our host mapping is 2525)
# When running the backend on your host machine, use "localhost".
# If the application is running inside Docker compose the SMTP server is
# reachable via the service name, so override this with the env var
# SPRING_MAIL_HOST=smtp4dev (see docker-compose.yml below).
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=2525
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# JWT Configuration (5 minutes for development)
app.jwt.expiration.days=0
app.jwt.expiration.hours=10
app.jwt.expiration.minutes=0

# Twilio credentials for development (leave blank or set via env vars)
# Twilio credentials are now stored per-account in the database
twilio.from-number=+18777532491
# when running dev profile also enforce the fixed SMS target
twilio.dev-target=+18777804236
twilio.use-dev-number=true
