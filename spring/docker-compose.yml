services:
  app:
    build:
      context: ..
      dockerfile: spring/Dockerfile
    container_name: waitlist-app
    environment:
      TZ: "America/New_York"
      SPRING_PROFILES_ACTIVE: prod
      SPRING_MAIL_HOST: smtp4dev    # so container can reach the mail service by name
      DATABASE_URL: jdbc:postgresql://postgres:5432/waitlist
      DATABASE_USERNAME: dragon
      DATABASE_PASSWORD: ieatsheep
      CORS_ALLOWED_ORIGINS: http://localhost
    networks:
      - waitlist_network
    expose:
      - "8080"

  nginx:
    image: nginx:alpine
    container_name: waitlist-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - waitlist_network

  smtp4dev:
    image: rnwood/smtp4dev:latest
    container_name: smtp4dev
    ports:
      - "2525:25"     # SMTP (container listens on 25)
      - "5000:80"     # web UI (mapped to 5000 to avoid nginx port 80 conflict)
    networks:
      - waitlist_network

  postgres:
    image: postgres:15-alpine
    container_name: waitlist-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: waitlist
      POSTGRES_USER: dragon
      POSTGRES_PASSWORD: ieatsheep
    ports:
      - "5432:5432"   # expose postgres to host
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - waitlist_network

networks:
  waitlist_network:
    driver: bridge

volumes:
  pgdata:

